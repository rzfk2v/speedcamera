<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2230"/>
      <stop offset="1" stop-color="#0a0e15"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#33425e" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#33425e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2f8"/>
      <stop offset="0.5" stop-color="#cad2dd"/>
      <stop offset="1" stop-color="#99a5b4"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8c98a7"/>
      <stop offset="1" stop-color="#586271"/>
    </linearGradient>
    <radialGradient id="lens" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#5577ab"/>
      <stop offset="0.45" stop-color="#1b2841"/>
      <stop offset="1" stop-color="#070b12"/>
    </radialGradient>
    <linearGradient id="slash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6a55"/>
      <stop offset="1" stop-color="#d61f12"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- pole + bracket (behind camera) -->
  <rect x="242" y="298" width="28" height="96" rx="9" fill="url(#metalDark)"/>
  <rect x="226" y="300" width="92" height="26" rx="11" fill="url(#metalDark)"/>

  <!-- camera body -->
  <rect x="150" y="170" width="212" height="150" rx="30" fill="url(#metal)"/>
  <rect x="166" y="182" width="180" height="38" rx="17" fill="#ffffff" opacity="0.18"/>

  <!-- visor / hood -->
  <rect x="138" y="150" width="214" height="42" rx="16" fill="url(#metalDark)"/>
  <rect x="138" y="150" width="214" height="17" rx="8" fill="#ffffff" opacity="0.12"/>

  <!-- flash unit -->
  <rect x="300" y="198" width="46" height="30" rx="8" fill="#ffb02e"/>
  <rect x="300" y="198" width="46" height="12" rx="6" fill="#ffffff" opacity="0.25"/>

  <!-- lens -->
  <circle cx="238" cy="252" r="60" fill="url(#metalDark)"/>
  <circle cx="238" cy="252" r="49" fill="url(#lens)"/>
  <circle cx="238" cy="252" r="49" fill="none" stroke="#04070c" stroke-width="3" opacity="0.5"/>
  <ellipse cx="222" cy="234" rx="15" ry="10" fill="#ffffff" opacity="0.30"/>

  <!-- prohibition slash -->
  <line x1="152" y1="156" x2="360" y2="362" stroke="#0a0e15" stroke-width="62" stroke-linecap="round"/>
  <line x1="152" y1="156" x2="360" y2="362" stroke="url(#slash)" stroke-width="40" stroke-linecap="round"/>
  <line x1="152" y1="156" x2="360" y2="362" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.16"/>
</svg>
