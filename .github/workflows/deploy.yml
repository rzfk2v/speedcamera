name: Deploy app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build id into SW cache + version tag
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          sed -i -E "s/(const CACHE = 'speedcam-[^']*)'/\1-${SHORT}'/" app/sw.js
          sed -i -E "s/(const APP_VERSION = '[^']*)'/\1+${SHORT}'/" app/app.js
          echo "Stamped build $SHORT"
          grep -nE "const CACHE|const APP_VERSION" app/sw.js app/app.js
      - name: Configure Pages (enables Pages on first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload app/ as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: app
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
